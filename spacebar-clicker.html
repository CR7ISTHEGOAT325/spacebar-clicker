<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Spacebar Clicker</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        user-select: none;
        background-color: #e9e9e1;
        background-image:
          linear-gradient(45deg, rgba(72, 61, 33, 0.08) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(72, 61, 33, 0.08) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(72, 61, 33, 0.08) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(72, 61, 33, 0.08) 75%);
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        background-size: 16px 16px;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
        margin: 0;
      }

      button {
        font: inherit;
      }

      .hide {
        display: none !important;
      }

      .spacebar {
        display: inline-block;
        min-width: 68px;
        height: 18px;
        background: linear-gradient(180deg, #eff2dd 0, #b1b495 100%);
        border: 2px solid #483d21;
        border-bottom-width: 5px;
        color: #483d21;
        border-radius: 4px;
        margin-right: 5px;
        vertical-align: middle;
      }

      #game {
        max-width: 1000px;
        margin: auto;
        overflow: hidden;
      }

      #toolbar {
        position: fixed;
        right: 10px;
        top: 10px;
        z-index: 10;
        display: flex;
        gap: 8px;
      }

      #toolbar button {
        border: 2px solid #483d21;
        background: #fcffe5;
        color: #483d21;
        border-radius: 5px;
        padding: 6px 10px;
        cursor: pointer;
      }

      #counter {
        text-align: center;
        font-size: 8rem;
        color: #483d21;
        height: 8rem;
        font-weight: 700;
      }

      #counter span {
        display: block;
        text-align: center;
      }

      #per_second {
        font-size: 1.5rem;
        text-align: center;
        margin-bottom: 1rem;
        color: #483d21;
      }

      .sbs {
        display: block;
        font-size: 1.2rem;
        color: #8a7d5a;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 15px;
        padding-top: 40px;
        padding-bottom: 10px;
        cursor: pointer;
      }

      .sb1 {
        border: 5px solid #483d21;
        border-bottom-width: 25px;
        border-radius: 15px;
        transition: transform 80ms ease-in;
        background: linear-gradient(180deg, #eff2dd 0, #b1b495 100%);
      }

      .sb1:hover {
        color: #483d21;
      }

      .sb1:active,
      .sb_active {
        border-bottom-width: 15px;
        padding-top: 50px;
        transform: scaleX(0.9) scaleY(0.9);
        transition: transform 10ms ease-in;
      }

      #items {
        list-style: none;
        margin: 1rem 0 0;
        padding: 10px;
        overflow-y: auto;
      }

      .item {
        display: block;
        border: 1px solid #483d21;
        border-radius: 5px;
        margin: 0 0 15px;
        padding: 15px;
        opacity: 0.5;
        background-color: #e9e9e1;
      }

      .item_last_child {
        margin-bottom: 80px;
      }

      .item span {
        display: block;
      }

      .item_buyable {
        opacity: 1;
        background: linear-gradient(180deg, #fcffe5 0, #e5e8d1 100%);
        cursor: pointer;
      }

      .item_buyable:hover {
        background: linear-gradient(180deg, #feffdb 0, #f9fbb2 100%);
      }

      .item_buyable:active {
        background: linear-gradient(180deg, #dfe3c0 0, #b7ba9c 100%);
      }

      .ititle {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }

      .idesc {
        font-size: 1rem;
      }

      .cost {
        margin-top: 15px;
      }

      .icost {
        display: inline !important;
      }

      .ilvl {
        font-size: 3rem;
        float: right;
      }

      ._ilvl {
        display: inline !important;
        font-size: 1rem;
      }

      .particle {
        width: auto;
        position: absolute;
        pointer-events: none;
        left: 0;
        right: 0;
      }

      .score {
        font-weight: 700;
        font-size: 1.3rem;
        color: #483d21;
        z-index: 100;
      }

      .spacebar_particle {
        pointer-events: none;
        position: absolute;
        left: 0;
        top: 0;
        z-index: -100;
        min-width: 5px;
        width: 5px;
        height: 15px;
      }

      @media (max-width: 640px) {
        #counter {
          font-size: 5.5rem;
        }

        .sbs {
          letter-spacing: 8px;
        }

        #toolbar {
          position: static;
          justify-content: flex-end;
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="reset" type="button">Reset</button>
      <button id="sound" type="button">Sound On</button>
    </div>

    <div id="game">
      <div id="header">
        <div id="counter"><span>0</span></div>
        <div id="per_second">per second: 0.000</div>
        <div class="sbc">
          <div id="sb" class="sbs sb1">SPACEBAR</div>
        </div>
      </div>
      <ul id="items">
        <li id="item-template" class="item hide">
          <span class="ilvl"><span class="_ilvl">x</span>0</span>
          <h1 class="ititle"></h1>
          <span class="idesc"></span>
          <div class="cost"><span class="spacebar"></span><span class="icost">0</span></div>
        </li>
      </ul>
    </div>

    <script>
      const gId = (id) => document.getElementById(id);
      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const clamp01 = (value) => clamp(value, 0, 1);
      const lerp = (from, to, amount) => from + (to - from) * clamp01(amount);
      const numberFormats = ["M", "B", "T", "Q", "Qui", "S", "Sp"];

      const nfmt = (value) => Math.floor(value).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      const nfmt1 = (value) => value.toFixed(3).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      const nfmt2 = (value) => {
        if (value < 1e6) return nfmt(value);
        let threshold = 1e6;
        for (const suffix of numberFormats) {
          if (value < (threshold *= 1e3)) {
            return nfmt1(value / (threshold / 1e3)) + suffix;
          }
        }
        return nfmt1(value / threshold) + numberFormats[numberFormats.length - 1];
      };

      const runCoroutine = (generatorFactory) => {
        const generator = generatorFactory();
        const next = () => {
          const step = generator.next();
          if (!step.done) setTimeout(next, 1000 * step.value);
        };
        next();
      };

      const isMobile = () => navigator.userAgent.match("Mobile");
      let audioEnabled = true;

      function playTone(frequency, duration = 0.045, type = "square") {
        if (!audioEnabled) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = playTone.ctx || (playTone.ctx = new AudioContext());
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = type;
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + duration);
      }

      const items = [
        {
          name: "Monkey",
          description: "A monkey to help you press space. It doesn't really know what a <i>spacebar</i> is, so it will just bash the whole keyboard and eventually hit it. It succeeds every <b>%v seconds</b>.",
          cost: 30,
          initialValue: 0.2,
          lvl: 0,
          costFunc: (value) => 1.1 * value,
          valueFunc: (value) => value,
          getDescription: (item) => item.description.replace("%v", 1 / item.initialValue)
        },
        {
          name: "Boomer Mom",
          description: "A boomer mom who can barely open a Word document will help you press it. Every mom can press it <b>%vx a second</b>!",
          cost: 120,
          initialValue: 3,
          lvl: 0,
          costFunc: (value) => 1.3 * value,
          valueFunc: (value) => value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "Gen Z Kid",
          description: "A Generation Z kid will help you press it. They haven't ever seen a keyboard before, but they're good at scrolling short vertical videos online, so they do it <b>%vx a second</b>!",
          cost: 500,
          initialValue: 20,
          lvl: 0,
          costFunc: (value) => 1.4 * value,
          valueFunc: (value) => value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "Keyboard Upgrade",
          description: "Every upgrade will <b>DOUBLE</b> your own hits.",
          cost: 6000,
          multiplier: 2,
          lvl: 0,
          costFunc: (value) => 3.5 * value,
          getDescription: (item) => item.description
        },
        {
          name: "Angry Influencer",
          description: "Angry influencer whose computer crashed and they're now bashing their head against the keyboard. The next one will give <b>%vx per second</b>.",
          cost: 10000,
          initialValue: 150,
          lvl: 0,
          costFunc: (value) => 1.5 * value,
          valueFunc: (value) => 1.2 * value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "MOBA Gamer",
          description: "MOBA gamers are fast at pressing keys and play well in teams. A new gamer will hit it <b>%vx per second</b>.",
          cost: 200000,
          initialValue: 600,
          lvl: 0,
          costFunc: (value) => 1.4 * value,
          valueFunc: (value) => 1.25 * value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "Homemade Pressing Robot",
          description: "A simple robot made out of a broken robot vacuum cleaner can press the key at <b>%vx per second</b>.",
          cost: 800000,
          initialValue: 3500,
          lvl: 0,
          costFunc: (value) => 1.4 * value,
          valueFunc: (value) => 1.25 * value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "Laser Machine Gun",
          description: "A machine gun that shoots a lot of laser blasts at the spacebar, at a rate of <b>%vx per second</b>!",
          cost: 2000000,
          initialValue: 25000,
          lvl: 0,
          costFunc: (value) => 1.4 * value,
          valueFunc: (value) => 1.3 * value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "Nuclear Blast Gun",
          description: "No one knows how it works, but the rate is pretty high at <b>%vx per second</b>!",
          cost: 10000000,
          initialValue: 100000,
          lvl: 0,
          costFunc: (value) => 1.4 * value,
          valueFunc: (value) => 1.3 * value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        },
        {
          name: "Alien Tech Key Pressing Machine",
          description: "Mysterious tech with a very high rate: <b>%vx per second</b>!",
          cost: 80000000,
          initialValue: 1000000,
          lvl: 0,
          costFunc: (value) => 1.4 * value,
          valueFunc: (value) => 1.3 * value,
          getDescription: (item) => item.description.replace("%v", nfmt(item.value))
        }
      ];

      for (const item of items) {
        item.value = item.initialValue;
      }

      const totalItemValue = (item) => {
        let total = 0;
        let value = item.initialValue;
        for (let level = 0; level < item.lvl; level++) {
          total += value;
          value = item.valueFunc(value);
        }
        return total;
      };

      const levels = [
        { psvalue: 0, rain: 0 },
        { psvalue: 10, rain: 5 },
        { psvalue: 100, rain: 10 },
        { psvalue: 500, rain: 12 },
        { psvalue: 1000, rain: 15 },
        { psvalue: 5000, rain: 17 },
        { psvalue: 10000, rain: 18 },
        { psvalue: 50000, rain: 19 },
        { psvalue: 100000, rain: 20 },
        { psvalue: 300000, rain: 21 },
        { psvalue: 800000, rain: 22 },
        { psvalue: 1000000, rain: 23 }
      ];

      class ParticleSystem {
        constructor(lifetime, updateParticle) {
          this.lifetime = lifetime;
          this.updateParticle = updateParticle;
          this.particles = [];
          setInterval(this.update.bind(this), 16);
        }

        pushParticle(element, point) {
          this.particles.push({
            life: this.lifetime,
            element,
            x: point.x,
            y: point.y,
            ix: point.x,
            iy: point.y,
            alpha: 0,
            rot: 0
          });
          element.style.opacity = "0";
        }

        update() {
          const dead = [];
          for (const index in this.particles) {
            const particle = this.particles[index];
            particle.life -= 0.016;
            particle.normalizedTime = 1 - particle.life / this.lifetime;
            this.updateParticle(particle);
            particle.element.style.transform = `translateX(${particle.x}px) translateY(${particle.y}px) rotateZ(${particle.rot}deg)`;
            particle.element.style.opacity = `${1 - particle.alpha}`;
            if (particle.life <= 0) dead.push(index);
          }

          for (let i = dead.length - 1; i >= 0; i--) {
            this.particles[dead[i]].element.remove();
            this.particles.splice(dead[i], 1);
          }
        }
      }

      class Counter {
        constructor() {
          this.v = 0;
          this.va = 0;
          this.multiplier = 1;
          setInterval(this.update.bind(this), 10);
        }

        evaluateItems() {
          this.va = 0;
          this.multiplier = 1;
          for (const item of items) {
            if (item.multiplier !== undefined) {
              this.multiplier *= item.lvl > 0 ? Math.pow(item.multiplier, item.lvl) : 1;
            } else {
              this.va += totalItemValue(item);
            }
          }
        }

        update() {
          this.v += this.va / 100;
        }

        setValue(value) {
          this.v = value;
        }

        spend(value) {
          this.v -= value;
        }

        addOne() {
          this.v += this.multiplier;
          return this.multiplier;
        }
      }

      class Game {
        init() {
          this.currentLevel = 0;
          this.cc = gId("counter");
          this.cs = gId("per_second");
          this.counter = new Counter();
          this.sb = gId("sb");
          this.canclick = true;
          this.reloading = false;
          this.frameCounter = 0;
          this.itemContainer = gId("items");

          this.sb.addEventListener("mousedown", this.click.bind(this));
          document.addEventListener("keydown", this.keydown.bind(this));
          document.addEventListener("keyup", this.keyup.bind(this));
          document.setValue = this.setValue.bind(this);

          this.clickParticle = new ParticleSystem(1, (particle) => {
            particle.y = lerp(particle.y, particle.iy - 110, 0.05);
            particle.x = particle.ix + 10 * Math.sin(10 * (5 * particle.ix + particle.normalizedTime));
            particle.alpha = particle.normalizedTime;
          });

          this.rainParticle = new ParticleSystem(3, (particle) => {
            particle.y += 3;
            particle.x = particle.ix + 10 * Math.sin(10 * (5 * particle.ix + particle.normalizedTime));
            particle.rot = 10 * Math.sin(30 * particle.normalizedTime);
            particle.alpha = particle.normalizedTime;
          });

          this.buildItems();
          this.adjustSize();
          window.addEventListener("resize", this.adjustSize.bind(this));

          this.loadGame();
          this.updateItemDescriptions();
          this.counter.evaluateItems();
          this.checkCurrentLevel();
          this.update();
          setInterval(this.update.bind(this), 100);
        }

        buildItems() {
          const template = gId("item-template");
          for (const item of items) {
            const node = template.cloneNode(true);
            node.removeAttribute("id");
            node.classList.add("hide");
            node.querySelector(".ititle").textContent = item.name;
            node.querySelector(".idesc").innerHTML = item.getDescription(item);
            node.querySelector(".icost").textContent = nfmt2(item.cost);
            node.querySelector(".ilvl").innerHTML = '<span class="_ilvl">x</span>' + item.lvl;
            node.addEventListener("click", this.buy.bind(this, item));
            this.itemContainer.appendChild(node);
            item.dynElement = node;
          }
          template.remove();
        }

        adjustSize() {
          this.cc.style.fontSize = (isMobile() ? 8 - this.cc.innerText.length / 2 : 10 - this.cc.innerText.length / 3) + "rem";
          const offset = (this.cc.clientHeight - this.cc.firstChild.clientHeight) / 2;
          this.cc.firstChild.style.transform = `translateY(${offset}px)`;
          this.itemContainer.style.height = `${window.innerHeight - gId("header").offsetHeight}px`;
        }

        update() {
          this.updateCounter();
          this.updateItems();
          this.updateParticles();
          this.adjustSize();
          this.saveGame();
        }

        updateItems() {
          let unlockedIndex = 0;
          for (const index in items) {
            const item = items[index];
            if (item.lvl > 0) unlockedIndex = parseInt(index, 10) + 1;
            item.dynElement.classList.add("hide");
            item.dynElement.classList.remove("item_buyable", "item_last_child");
            item.dynElement.querySelector(".icost").textContent = nfmt2(item.cost);
            item.dynElement.querySelector(".ilvl").innerHTML = '<span class="_ilvl">x</span>' + item.lvl;
            if (item.cost <= this.counter.v) item.dynElement.classList.add("item_buyable");
          }

          let last = null;
          if (this.counter.v > 9 || this.counter.va > 0) {
            for (let i = 0; i < Math.min(items.length, unlockedIndex + 1); i++) {
              items[i].dynElement.classList.remove("hide");
              last = items[i].dynElement;
            }
          }
          if (last) last.classList.add("item_last_child");
        }

        updateItemDescriptions() {
          for (const item of items) {
            item.dynElement.querySelector(".idesc").innerHTML = item.getDescription(item);
          }
        }

        updateCounter() {
          this.cc.firstChild.innerText = nfmt2(this.counter.v);
          this.cs.innerHTML = "per second: " + (this.counter.va < 1000 ? nfmt1(this.counter.va) : nfmt2(this.counter.va));
        }

        updateParticles() {
          const level = levels[this.currentLevel];
          if (level.rain > 0 && this.frameCounter % (21 - clamp(level.rain, 0, 20)) === 0) {
            for (let i = 0; i < Math.floor(level.rain / 21) + 1; i++) {
              const element = document.createElement("div");
              element.classList.add("spacebar", "spacebar_particle");
              this.rainParticle.pushParticle(element, { x: Math.random() * window.innerWidth, y: 0 });
              document.body.insertBefore(element, document.body.firstChild);
            }
          }
          this.frameCounter++;
        }

        buy(item) {
          if (this.counter.v < item.cost) return;
          playTone(620, 0.08, "triangle");
          this.counter.spend(Math.floor(item.cost));
          item.lvl++;
          item.cost = item.costFunc(item.cost);
          if (item.initialValue !== undefined) {
            item.value = item.value === undefined ? item.valueFunc(item.initialValue) : item.valueFunc(item.value);
          }
          this.counter.evaluateItems();
          this.updateItemDescriptions();
          this.checkCurrentLevel();
          this.update();
          this.shake();
        }

        checkCurrentLevel() {
          for (const index in levels) {
            if (this.counter.va > levels[index].psvalue) this.currentLevel = index;
          }
        }

        setValue(value) {
          this.counter.setValue(value);
          this.update();
        }

        click(event) {
          const score = this.counter.addOne();
          this.updateCounter();
          playTone(220 + Math.random() * 80);
          if (!event) {
            const rect = this.sb.getBoundingClientRect();
            this.addPointParticle(rect.right - rect.width / 2 + 50 * Math.random() - 25, rect.top, score);
          } else {
            this.addPointParticle(event.clientX, event.clientY, score);
          }
        }

        keydown(event) {
          if (event.code === "Space" && this.canclick) {
            event.preventDefault();
            this.click();
            this.sb.classList.add("sb_active");
            this.canclick = false;
          }
        }

        keyup(event) {
          if (event.code === "Space") {
            this.sb.classList.remove("sb_active");
            this.canclick = true;
          }
        }

        resetGameSure() {
          if (window.confirm("Reset all game data?")) this.resetGame();
        }

        resetGame() {
          this.reloading = true;
          window.localStorage.removeItem("spacebar_clicker_game");
          window.location.reload();
        }

        loadGame() {
          const saved = window.localStorage.getItem("spacebar_clicker_game");
          if (!saved) return;
          const data = JSON.parse(saved);
          if (data.empty) return;
          this.counter.v = data.v;
          for (const index in items) {
            if (index >= data.items.length) break;
            items[index].cost = data.items[index].cost;
            items[index].lvl = data.items[index].lvl;
            items[index].value = data.items[index].value;
          }
        }

        saveGame() {
          if (this.reloading) return;
          const itemData = items.map((item) => ({
            cost: item.cost,
            lvl: item.lvl,
            value: item.value
          }));
          window.localStorage.setItem("spacebar_clicker_game", JSON.stringify({
            empty: false,
            v: this.counter.v,
            items: itemData
          }));
        }

        addPointParticle(x, y, score) {
          const element = document.createElement("div");
          element.textContent = "+" + score;
          element.classList.add("particle", "score");
          this.clickParticle.pushParticle(element, {
            x: x + 30 * Math.random() - 30,
            y: y + 30 * Math.random() - 20
          });
          document.body.insertBefore(element, document.body.firstChild);
        }

        shake(amount = 20, target = gId("game")) {
          runCoroutine(function* () {
            for (let i = 0; i < amount; i++) {
              const x = 30 * Math.random() - 15;
              const y = 30 * Math.random() - 15;
              const rotate = 6 * Math.random() - 3;
              target.style.transform = `translateX(${x}px) translateY(${y}px) rotateZ(${rotate}deg)`;
              yield 0.01;
            }
            target.style.transform = "translateX(0) translateY(0) rotateZ(0)";
          });
        }
      }

      const game = new Game();
      game.init();

      gId("reset").addEventListener("click", () => game.resetGameSure());
      gId("sound").addEventListener("click", (event) => {
        audioEnabled = !audioEnabled;
        event.currentTarget.textContent = audioEnabled ? "Sound On" : "Sound Off";
      });
    </script>
  </body>
</html>
